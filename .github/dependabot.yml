version: 2
updates:
  # 1. GitHub Actions: Hardened SHA Updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily" # Lebih agresif selama masa transisi Node 24
    reviewers:
      - "novaferrydianto"
    assignees:
      - "novaferrydianto"
    open-pull-requests-limit: 10
    groups:
      github-actions-updates:
        patterns:
          - "*" # Gabungkan semua update actions agar log Node 20 bersih dalam satu PR
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "security"
      - "github-actions"

  # 2. NPM: Grouped for Efficiency
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: daily
      day: "monday"
    reviewers:
      - "novaferrydianto"
    assignees:
      - "novaferrydianto"
    open-pull-requests-limit: 5
    # ✅ Improved Grouping Syntax
    groups:
      nodejs-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "build"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"

  # 3. Docker: Base Image Hardening
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: daily
      day: "monday"
    reviewers:
      - "novaferrydianto"
    # ✅ Jika Anda menggunakan multi-stage build atau banyak Dockerfile
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"