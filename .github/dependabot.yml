version: 2
updates:
  # 1. GitHub Actions: Hardened SHA Updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    # ✅ Strategi untuk mengupdate SHA tanpa merusak komentar versi
    versioning-strategy: increase-if-necessary
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "security"
      - "devops"

  # 2. NPM: Grouped for Efficiency
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # ✅ Menggabungkan banyak update kecil jadi satu PR (anti-noise)
    groups:
      nodejs-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "javascript"

  # 3. Docker: Base Image Hardening
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
