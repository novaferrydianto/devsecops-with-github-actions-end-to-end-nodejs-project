# .github/dependabot.yml
# Keeps the SHA-pinned GitHub Actions (and app/base-image deps) up to date.
# Dependabot updates BOTH the commit SHA and the trailing "# vX.Y.Z" comment,
# so pinning stays secure AND readable without manual SHA hunting.
version: 2
updates:
  # --- GitHub Actions: refreshes the pinned commit SHAs in the workflow ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      ci-actions:
        patterns: ["*"]   # one grouped PR instead of many noisy ones

  # --- Node.js app dependencies (package.json / package-lock.json) ---
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]

  # --- Dockerfile base image (e.g. cgr.dev/chainguard/node) ---
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
