name: 🚀 Lint Workflows (actionlint)

on:
  pull_request:
    paths:
      - '.github/workflows/**.yml'
      - '.github/workflows/**.yaml'

# ✅ SRE Best Practice: Hemat antrean runner dengan membatalkan proses lama
concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

# ✅ PoLP: Hanya butuh akses baca untuk melakukan linting
permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    name: 🧩 Check YAML Quality
    steps:
      # ✅ Hardened: SHA Pinning untuk checkout
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.1
        
      # ✅ Hardened & FIXED: Menggunakan action resmi reviewdog/action-actionlint
      - name: Run Actionlint
        uses: reviewdog/action-actionlint@v1
