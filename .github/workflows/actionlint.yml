name: 🚀 Lint Workflows (actionlint)

on:
  pull_request:
    paths:
      - '.github/workflows/**.yml'
      - '.github/workflows/**.yaml'

# ✅ SRE Best Practice: Hemat antrean runner dengan membatalkan proses lama
concurrency:
  group: actionlint-${{ github.ref }}
  cancel-in-progress: true

# ✅ PoLP: Hanya butuh akses baca untuk melakukan linting
permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    name: 🧩 Check YAML Quality
    steps:
      # ✅ Hardened: SHA Pinning untuk checkout
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: audit

      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.1.1
        
      # ✅ Hardened & FIXED: Menggunakan action resmi reviewdog/action-actionlint
      - name: Run Actionlint
        uses: step-security/action-actionlint@c3aa382d371c6b05513ae5907d4f77713e21813c # v1.72.0
