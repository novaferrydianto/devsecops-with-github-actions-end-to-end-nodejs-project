name: "CodeQL Advanced SAST"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '22 3 * * 4'

# ✅ SRE Best Practice: Hemat kuota runner dengan membatalkan scan lama di PR yang sama
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

# ✅ PoLP: Global lockdown
permissions: read-all

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    
    permissions:
      # WAJIB: Untuk mengunggah hasil scan ke dashboard GitHub Security
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: javascript-typescript
          build-mode: none

    steps:
    # 🔄 DEPENDABOT HANDOFF: Menggunakan Tag stabil v4
    - name: Checkout repository
      uses: actions/checkout@v4

    # 🔄 DEPENDABOT HANDOFF: Menggunakan Tag stabil v3
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        
        # ✅ HARDENED: Mengaktifkan kueri ekstra untuk deteksi kerentanan mendalam & kualitas kode
        queries: security-extended,security-and-quality

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
