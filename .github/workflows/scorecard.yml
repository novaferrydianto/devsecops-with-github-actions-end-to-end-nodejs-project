name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '16 10 * * 2'
  push:
    branches: [ "master" ]

# ✅ PoLP: Global lockdown to read-only
permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    if: github.event.repository.default_branch == github.ref_name
    
    # ✅ Job-level elevation
    permissions:
      security-events: write # Untuk upload SARIF ke tab Security
      id-token: write        # Untuk mempublikasikan hasil ke OpenSSF (OIDC)
      contents: read         # Diperlukan untuk checkout

    steps:
      # ✅ Hardened: SHA Pinning (v4.1.1)
      - name: "Checkout code"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@v2.4.3 # Menggunakan versi stabil terbaru
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          results_file: results.sarif
          results_format: sarif
          
          # 🔑 SCORECARD_TOKEN: Pastikan ini adalah Fine-grained PAT dengan akses read-only
          # Jika repositori publik, GITHUB_TOKEN bawaan terkadang cukup, tapi PAT lebih disarankan.
          repo_token: ${{ secrets.SCORECARD_TOKEN }}
          
          publish_results: true

      - name: "Upload artifact"
        uses: actions/upload-artifact@v7
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@v4 # Gunakan v4 untuk kompatibilitas Node 24
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          sarif_file: results.sarif
