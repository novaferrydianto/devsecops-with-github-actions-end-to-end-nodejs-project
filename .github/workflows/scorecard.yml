name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '16 10 * * 2'
  push:
    branches: [ "master" ]

# ✅ PoLP: Declare default permissions as read only.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    if: github.event.repository.default_branch == github.ref_name || github.event_name == 'pull_request'
    
    # ✅ Job-level elevation for SARIF and Badge publishing
    permissions:
      security-events: write
      id-token: write

    steps:
      # ✅ Hardened: SHA Pinning for Checkout
      - name: "Checkout code"
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f # v4.1.1 (Compatible with v5 setup)
        with:
          persist-credentials: false

      # ✅ Hardened: SHA Pinning for Scorecard Action v2.4.3
      - name: "Run analysis"
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          results_file: results.sarif
          results_format: sarif
          
          # 🔑 CRITICAL FIX: Token ini WAJIB ada agar Scorecard bisa membaca Branch Rulesets Bapak.
          repo_token: ${{ secrets.SCORECARD_TOKEN }}
          
          publish_results: true

      # ✅ Hardened: SHA Pinning for Upload Artifact v4.4.3
      - name: "Upload artifact"
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      # ✅ Hardened: SHA Pinning for CodeQL SARIF Upload v3.26.0
      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@b611370bf08c274ea11e2087e5eb50d52b9f3900 # v3.26.0
        with:
          sarif_file: results.sarif
