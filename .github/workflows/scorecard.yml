name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '16 10 * * 2'
  push:
    branches: [ "master" ]

# ✅ PoLP: Declare default permissions as read only.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    if: github.event.repository.default_branch == github.ref_name || github.event_name == 'pull_request'
    
    # ✅ Job-level elevation for SARIF and Badge publishing
    permissions:
      security-events: write
      id-token: write

    steps:
      # ✅ Hardened: SHA Pinning for Checkout (Ini sudah valid)
      - name: "Checkout code"
        uses: actions/checkout@1d96c772d19495a3b5c517cd2bc0cb401ea0529f # v4.1.1
        with:
          persist-credentials: false

      # 🔄 DEPENDABOT HANDOFF: Menggunakan Tag stabil, biarkan Dependabot yang mencari SHA-nya
      - name: "Run analysis"
        uses: ossf/scorecard-action@v2.4.3
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
        with:
          results_file: results.sarif
          results_format: sarif
          
          # 🔑 CRITICAL FIX: Pastikan SCORECARD_TOKEN sudah dibuat di GitHub Secrets
          repo_token: ${{ secrets.SCORECARD_TOKEN }}
          
          publish_results: true

      # 🔄 DEPENDABOT HANDOFF: Kembali ke tag v4
      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      # 🔄 DEPENDABOT HANDOFF: Kembali ke tag v3
      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
