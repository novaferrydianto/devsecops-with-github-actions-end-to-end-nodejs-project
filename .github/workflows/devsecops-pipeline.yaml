name: "DevSecOps Production Pipeline"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ${{ secrets.REGISTRY }}
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  LOCAL_IMAGE_REPO: docker.io/${{ github.repository }}
  LOCAL_IMAGE_TAG: ${{ github.sha }}

defaults:
  run:
    shell: bash

jobs:
  # =================================================================
  # STAGE 1: SAST & SCA
  # =================================================================
  test_and_sast:
    runs-on: ubuntu-latest
    name: 🧱 Test & SAST
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
                
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
                
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
                
      - name: Install & Test
        run: |
          npm ci
          npm test
          npx cross-env NODE_OPTIONS=--experimental-vm-modules npm run cover
                
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=devsecopsganodejs
            -Dsonar.projectKey=devsecopsganodejs
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  security_audit:
    runs-on: ubuntu-latest
    name: 🧩 SCA & Secret Scan
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
                
      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                
      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=low --json-file-output=snyk-report.json
                
      - name: Enforce Policy
        if: github.ref == 'refs/heads/master'
        run: |
          set -euo pipefail
          VULN_COUNT=$(jq '[.vulnerabilities[]? | select(.severity=="high" or .severity=="critical")] | length' snyk-report.json)
          if [ "$VULN_COUNT" -ne "0" ]; then echo "High vulnerabilities found!"; exit 1; fi

  # =================================================================
  # STAGE 2: CONTAINER SECURITY (Fix for Path Not Found)
  # =================================================================
  image_security:
    needs: [test_and_sast, security_audit]
    runs-on: ubuntu-latest
    name: 🧪 Build & Image Scan
    permissions:
      contents: read
      security-events: write 
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3

      - name: Build Local
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true # CRITICAL: Agar image bisa di-scan Trivy di local runner
          tags: ${{ env.LOCAL_IMAGE_REPO }}:${{ env.LOCAL_IMAGE_TAG }}
                
      - name: Trivy Image Scan (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'image'
          image-ref: '${{ env.LOCAL_IMAGE_REPO }}:${{ env.LOCAL_IMAGE_TAG }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0' # Biarkan upload SARIF menangani pelaporan
                
      - name: Upload SARIF to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-image'

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: '${{ env.LOCAL_IMAGE_REPO }}:${{ env.LOCAL_IMAGE_TAG }}'
          format: 'cyclonedx'
          output: 'trivy-sbom.json'
                
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sbom
          path: trivy-sbom.json

  # =================================================================
  # STAGE 3: DELIVERY & SIGNING
  # =================================================================
  delivery:
    needs: [image_security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    name: 📦 Delivery & Sign
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest
            ${{ secrets.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          IMAGE_PATH="${{ secrets.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:${{ github.sha }}"
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          cosign sign --key cosign.key -y "$IMAGE_PATH"

  # =================================================================
  # STAGE 4: DAST
  # =================================================================
  dast:
    needs: [image_security]
    runs-on: ubuntu-latest
    name: 🎯 DAST Scan
    steps:
      - uses: actions/checkout@v5
      - name: Run App
        run: |
          docker build -t app-dast .
          docker run -d --name my-app -p 3000:3000 app-dast
          sleep 15
                
      - name: ZAP Scan
        run: |
          chmod 777 $(pwd)
          docker run -v "$(pwd):/zap/wrk/:rw" --network="host" -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://localhost:3000 -r report.html -J report.json || true
                
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report.*

  # =================================================================
  # FINAL SUMMARY
  # =================================================================
  summary:
    needs: [delivery, dast]
    if: always()
    runs-on: ubuntu-latest
    name: 🧾 Summary
    steps:
      - name: Final Summary
        run: |
          echo "## 🚀 Pipeline Status for Nova" >> $GITHUB_STEP_SUMMARY
          echo "- **Hardening:** Chainguard Verified ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Signing:** Cosign Signed ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Scan:** SARIF Uploaded ✅" >> $GITHUB_STEP_SUMMARY
