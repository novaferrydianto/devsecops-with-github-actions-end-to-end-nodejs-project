name: DevSecOps Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # 03:00 WIB (UTC+7) = 20:00 UTC
    - cron: "0 20 * * *"
  workflow_dispatch:

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write
  actions: read
  issues: write
  packages: write

env:
  NODE_VERSION: 24
  REGISTRY: ${{ secrets.REGISTRY }}
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  LOCAL_IMAGE_REPO: docker.io/${{ github.repository }}
  LOCAL_IMAGE_TAG: ${{ github.sha }}

defaults:
  run:
    shell: bash

jobs:
  # =================================================================
  # STAGE 1: PARALLEL VALIDATION (SAST & SCA)
  # =================================================================

  test_and_sast:
    runs-on: ubuntu-latest
    name: 🧱 Test & SAST
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install & Test
        run: |
          npm ci
          npm test
          npx cross-env NODE_OPTIONS=--experimental-vm-modules npm run precover
          npx cross-env NODE_OPTIONS=--experimental-vm-modules npm run cover

      - name: SonarCloud Scan
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=devsecopsganodejs
            -Dsonar.projectKey=devsecopsganodejs
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.scanner.skipJreProvisioning=true

  security_audit:
    runs-on: ubuntu-latest
    name: 🧩 SCA & FS Audit
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=low --json-file-output=snyk-report.json

      - name: Enforce Snyk Policy (Gate on Push/Master)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          set -euo pipefail
          if [ ! -f snyk-report.json ]; then exit 2; fi
          jq -e '([.. | objects | select(has("severity")) | .severity] | map(select(.=="high" or .=="critical")) | length) == 0' snyk-report.json >/dev/null || { echo "⛔ Snyk gate failed!"; exit 1; }

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: table
          output: trivy-report.txt

      - name: Upload Security Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            snyk-report.json
            trivy-report.txt

  # =================================================================
  # STAGE 2: CONTAINER SECURITY
  # =================================================================

  image_build_local_trivy_sarif:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    name: 🧪 Local Build & Image Scan
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build local
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.LOCAL_IMAGE_REPO }}:${{ env.LOCAL_IMAGE_TAG }}
      
      - name: Trivy Image Scan (SARIF)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: image
          image-ref: ${{ env.LOCAL_IMAGE_REPO }}:${{ env.LOCAL_IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIF to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

  # =================================================================
  # STAGE 3: ARTIFACT DELIVERY & SIGNING
  # =================================================================

  podman_build_push:
    if: github.event_name != 'schedule'
    needs: [test_and_sast, security_audit, image_build_local_trivy_sarif]
    runs-on: ubuntu-latest
    name: 📦 Podman Build & Push
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
      image_repo: ${{ steps.meta.outputs.image_repo }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: |
          echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${{ secrets.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
      - name: Install Podman
        run: sudo apt-get update && sudo apt-get install -y podman
      - name: Registry Login
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | podman login docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      - name: Build & Push
        run: |
          podman build -t "${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.sha_tag }}" -t "${{ steps.meta.outputs.image_repo }}:latest" .
          podman push "${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.sha_tag }}"
          podman push "${{ steps.meta.outputs.image_repo }}:latest"

  cosign_sign:
    if: github.event_name != 'schedule'
    needs: [podman_build_push]
    runs-on: ubuntu-latest
    name: 🔏 Cosign Signing
    steps:
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Sign Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          FULL_IMAGE: ${{ needs.podman_build_push.outputs.image_repo }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          cosign sign --key cosign.key -y "$FULL_IMAGE:${{ needs.podman_build_push.outputs.sha_tag }}"

  # =================================================================
  # STAGE 4: RUNTIME SECURITY (DAST)
  # =================================================================

  dast_zap_ci:
    if: github.event_name != 'schedule'
    needs: cosign_sign
    runs-on: ubuntu-latest
    name: 🎯 ZAP Baseline (CI)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Start App & Scan
        run: |
          npm ci && npm start & 
          sleep 15
          docker run -v $(pwd):/zap/wrk/:rw --network="host" -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://localhost:3000 -r report.html -J report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: zap-report-ci
          path: report.*

  dast_zap_nightly:
    if: github.event_name == 'schedule'
    needs: [test_and_sast, security_audit]
    runs-on: ubuntu-latest
    name: 🎯 ZAP Full (Nightly)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Full Scan
        run: |
          npm ci && npm start & 
          sleep 15
          docker run -v $(pwd):/zap/wrk/:rw --network="host" -t ghcr.io/zaproxy/zaproxy:stable zap-full-scan.py -t http://localhost:3000 -r report.html -J report.json -a || true
      - uses: actions/upload-artifact@v4
        with:
          name: zap-report-nightly
          path: report.*

  # =================================================================
  # FINAL SUMMARY
  # =================================================================

  summary:
    needs: [test_and_sast, security_audit, podman_build_push, cosign_sign, dast_zap_ci, dast_zap_nightly]
    if: always()
    runs-on: ubuntu-latest
    name: 🧾 Summary
    steps:
      - name: Final Summary
        run: |
          echo "## DevSecOps Pipeline — Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Node Version: ${{ env.NODE_VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ SAST/SCA/Audit Layers Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- ✅ Status: Pipeline Finished" >> "$GITHUB_STEP_SUMMARY"
