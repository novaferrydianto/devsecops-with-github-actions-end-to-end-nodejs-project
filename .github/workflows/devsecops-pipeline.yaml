name: "DevSecOps Production Pipeline"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  # Force GitHub Actions to use Node 24 for its own internal runners
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}
  LOCAL_IMAGE_TAG: ${{ github.sha }}

jobs:
  # =================================================================
  # STAGE 1: SAST & SCA
  # =================================================================
  test_and_sast:
    runs-on: ubuntu-latest
    name: 🧱 Test & SAST
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          
      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install & Test
        run: |
          npm ci
          npm test
          npx cross-env NODE_OPTIONS=--experimental-vm-modules npm run cover || echo "No tests found"

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT }}

  # =================================================================
  # STAGE 2: CONTAINER SECURITY (The Fix for SARIF Error)
  # =================================================================
  image_build_and_scan:
    needs: [test_and_sast]
    runs-on: ubuntu-latest
    name: 🛡️ Build & Image Scan
    permissions:
      contents: read
      security-events: write 
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Local for Scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true # Meload image ke docker daemon lokal runner
          tags: ${{ env.IMAGE_NAME }}:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Image Scan (SARIF Generation)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:local
          format: 'sarif'
          output: 'trivy-results.sarif' # Nama file output
          severity: 'CRITICAL,HIGH'
          exit-code: '0' # Jangan gagalkan job di sini agar upload SARIF tetap berjalan

      - name: Upload SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() # CRITICAL: Tetap jalankan meski langkah sebelumnya gagal
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-image'

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:local
          format: 'cyclonedx'
          output: 'trivy-sbom.json'

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: trivy-sbom.json

  # =================================================================
  # STAGE 3: DELIVERY & SIGNING (Chainguard Ready)
  # =================================================================
  push_and_sign:
    needs: [image_build_and_scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    name: 📦 Push & Sign
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          cosign sign --key cosign.key -y ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # =================================================================
  # STAGE 4: DAST (OWASP ZAP)
  # =================================================================
  dast_zap:
    needs: [image_build_and_scan]
    runs-on: ubuntu-latest
    name: 🎯 DAST Scan
    steps:
      - name: Run App Container
        run: |
          docker build -t app-dast .
          docker run -d --name my-app -p 3000:3000 app-dast
          sleep 15 # Wait for app to warm up

      - name: ZAP Baseline Scan
        run: |
          chmod 777 $(pwd)
          docker run -v "$(pwd):/zap/wrk/:rw" --network="host" -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://localhost:3000 -r report.html -J report.json || true

      - name: Upload DAST Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report.*

  # =================================================================
  # STAGE 5: SUMMARY
  # =================================================================
  summary:
    needs: [push_and_sign, dast_zap]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Create Summary
        run: |
          echo "## 🚀 DevSecOps Summary for Nova" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Hardening:** Chainguard Applied ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Vulnerability Scan:** SARIF Uploaded to Security Tab ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Supply Chain:** Cosign Signed ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **DAST:** OWASP ZAP Baseline Completed ✅" >> $GITHUB_STEP_SUMMARY
