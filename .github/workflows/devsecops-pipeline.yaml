name: DevSecOps Pipeline
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: false

# ✅ Global Config
env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ${{ secrets.REGISTRY }}
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  LOCAL_IMAGE_REPO: docker.io/${{ github.repository }}
  LOCAL_IMAGE_TAG: ${{ github.sha }}

defaults:
  run:
    shell: bash

jobs:
  # =================================================================
  # STAGE 1: SAST, SCA & AIKIDO
  # =================================================================
  test_and_sast:
    runs-on: ubuntu-latest
    name: 🧱 Test & SAST
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install & Test
        run: |
          npm ci
          npm test
          npx cross-env NODE_OPTIONS=--experimental-vm-modules npm run cover

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=devsecopsganodejs
            -Dsonar.projectKey=devsecopsganodejs
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.scanner.skipJreProvisioning=true

  security_audit:
    needs: [test_and_sast]
    runs-on: ubuntu-latest
    name: 🧩 SCA, License & FS Audit
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=low --json-file-output=snyk-report.json

      - name: Generate Snyk HTML Report
        if: always()
        run: |
          npm install -g snyk-to-html
          snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Enforce Security & Whitelist License Policy
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          set -euo pipefail
          if [ ! -f snyk-report.json ]; then echo "Snyk report missing"; exit 0; fi
          VULN_COUNT=$(jq '[.vulnerabilities[]? | select(.severity=="high" or .severity=="critical")] | length' snyk-report.json)
          ALLOWED_REGEX="MIT|Apache-2.0|BSD-2-Clause|BSD-3-Clause|ISC"
          ILLEGAL_LICENSES=$(jq -r --arg ALLOWED "$ALLOWED_REGEX" '
            [.vulnerabilities[]? | select(.type=="license") | select(.title | test($ALLOWED; "i") | not) | .title] | unique | join(", ")
          ' snyk-report.json)
          
          if [ "$VULN_COUNT" -ne "0" ]; then
            echo "❌ Critical/High Vulnerabilities found: $VULN_COUNT"
            exit 1
          fi
          if [ ! -z "$ILLEGAL_LICENSES" ]; then
            echo "❌ Illegal Licenses found: $ILLEGAL_LICENSES"
            exit 1
          fi

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          format: table
          output: trivy-report.txt

      - name: Upload Security Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: snyk-report.*

  # ✅ UPDATED: Setting fail-on to false for Free Plan compatibility
  aikido_security:
    needs: [test_and_sast]
    runs-on: ubuntu-latest
    name: 🛡️ Aikido Security Scan
    permissions:
      contents: read
      security-events: write
      pull-requests: write 
    steps:
      - uses: actions/checkout@v5
      - name: Run Aikido Scan
        uses: aikidosec/github-actions-workflow@main
        with:
          secret-key: ${{ secrets.AIKIDO_API_KEY }}
          fail-on-dependency-scan: false # Menghindari Error 402
          fail-on-sast-scan: false       # Menghindari Error 402
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # =================================================================
  # STAGE 2: CONTAINER SECURITY
  # =================================================================
  image_build_local_trivy_sarif:
    needs: [security_audit, aikido_security]
    runs-on: ubuntu-latest
    name: 🧪 Build & Image Scan
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      
      - name: Build local
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.LOCAL_IMAGE_REPO }}:${{ env.LOCAL_IMAGE_TAG }}

      - name: Trivy Image Scan (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true
        with:
          scan-type: image
          image-ref: ${{ env.LOCAL_IMAGE_REPO }}:${{ env.LOCAL_IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIF to Security Tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

  # =================================================================
  # STAGE 3: DELIVERY & SIGNING
  # =================================================================
  podman_build_push:
    needs: [image_build_local_trivy_sarif]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    name: 📦 Podman Build & Push
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install & Login Podman
        run: |
          sudo apt-get update && sudo apt-get install -y podman
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | podman login docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      - name: Build & Push
        run: |
          IMAGE_PATH="${{ secrets.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}"
          TAG="${GITHUB_SHA::7}"
          podman build -t "$IMAGE_PATH:$TAG" -t "$IMAGE_PATH:latest" .
          podman push "$IMAGE_PATH:$TAG"
          podman push "$IMAGE_PATH:latest"

  cosign_sign:
    needs: [podman_build_push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    name: 🔏 Cosign Sign & Verify
    permissions:
      contents: read
      id-token: write 
    steps:
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Sign Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          IMAGE_PATH="${{ secrets.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}"
          TAG="${GITHUB_SHA::7}"
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          cosign sign --key cosign.key -y "$IMAGE_PATH:$TAG"

  # =================================================================
  # STAGE 4: DAST & ISSUE AUTOMATION
  # =================================================================
  dast_zap_ci:
    needs: [image_build_local_trivy_sarif]
    runs-on: ubuntu-latest
    name: 🎯 ZAP Baseline (CI)
    continue-on-error: true
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build and Run App Container
        run: |
          docker build -t app-local-dast .
          docker run -d --network="host" -e OPENWEATHER_API_KEY="dummy" app-local-dast
          sleep 25
      - name: ZAP Baseline Scan
        run: |
          docker run --user root -v "$(pwd):/zap/wrk/:rw" --network="host" \
            ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:3000 \
            -r report.html \
            -J report.json || true
      - name: Create or Update ZAP Security Issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ -f report.json ]; then
            ALERTS=$(jq '[.site[].alerts[]? | select(.riskcode != "0")] | length' report.json || echo "0")
            EXISTING_ISSUE=$(gh issue list -R "$REPO" --label "security" --state open --json number --jq '.[0].number')
            if [ "$ALERTS" -gt "0" ]; then
              if [ -z "$EXISTING_ISSUE" ] || [ "$EXISTING_ISSUE" == "null" ]; then
                gh issue create -R "$REPO" --title "🎯 DAST ZAP Vulnerabilities Detected" --body "ZAP detected $ALERTS vulnerabilities." --label "security"
              fi
            elif [ -n "$EXISTING_ISSUE" ] && [ "$EXISTING_ISSUE" != "null" ]; then
              gh issue close "$EXISTING_ISSUE" -R "$REPO" -c "✅ Resolved via security hardening."
            fi
          fi

  # =================================================================
  # FINAL SUMMARY
  # =================================================================
  summary:
    needs: [test_and_sast, security_audit, aikido_security, cosign_sign, dast_zap_ci]
    if: always()
    runs-on: ubuntu-latest
    name: 🧾 Summary
    steps:
      - name: Post Summary
        run: |
          {
            echo "## DevSecOps Pipeline — Final Summary 🚀"
            echo "- ✅ **SAST/SCA:** Snyk & Aikido (Free Mode)"
            echo "- ✅ **Supply Chain:** Image Signed with Cosign"
            echo "- ✅ **DAST:** ZAP Automated Issue Monitoring"
          } >> "$GITHUB_STEP_SUMMARY"
