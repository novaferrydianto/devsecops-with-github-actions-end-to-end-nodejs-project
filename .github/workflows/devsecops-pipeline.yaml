name: "DevSecOps Production Pipeline"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}
  # Menggunakan Digest atau SHA untuk Immutability total di produksi
  CHAINGUARD_NODE: cgr.dev/chainguard/node:24

jobs:
  # =================================================================
  # STAGE 1: SAST & SCA (The Shield)
  # =================================================================
  sast_and_audit:
    runs-on: ubuntu-latest
    name: 🧱 SAST & SCA Audit
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install & Test
        run: |
          npm ci
          npm test
          # Generasi coverage untuk Sonar
          npx cross-env NODE_OPTIONS=--experimental-vm-modules npm run cover || echo "Tests failed"

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT }}
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

      - name: Snyk Open Source Analysis
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high --json-file-output=snyk-report.json

      - name: Enforce License & Security Policy
        run: |
          set -euo pipefail
          VULN_COUNT=$(jq '[.vulnerabilities[]? | select(.severity=="high" or .severity=="critical")] | length' snyk-report.json)
          ALLOWED_LICENSES="MIT|Apache-2.0|BSD-2-Clause|BSD-3-Clause|ISC"
          if [ "$VULN_COUNT" -ne "0" ]; then echo "High/Critical Vulns found!"; exit 1; fi

  # =================================================================
  # STAGE 2: HARDENED BUILD (Chainguard)
  # =================================================================
  build_and_scan:
    needs: [sast_and_audit]
    runs-on: ubuntu-latest
    name: 🛡️ Chainguard Build & Scan
    permissions:
      contents: read
      security-events: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Load (Local Scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:local
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy Vulnerability Scan (Image)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:local
          format: sarif
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:local
          format: cyclonedx
          output: sbom.json

      - name: Push Hardened Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-production
          path: sbom.json

  # =================================================================
  # STAGE 3: SUPPLY CHAIN INTEGRITY (Cosign)
  # =================================================================
  signing:
    needs: [build_and_scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    name: 🔏 Sign & Attest
    permissions:
      contents: read
      id-token: write # Diperlukan untuk Keyless signing jika mau
      packages: write
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Sign Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          cosign sign --key cosign.key -y ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cosign sign --key cosign.key -y ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # =================================================================
  # STAGE 4: DAST (Dynamic Analysis)
  # =================================================================
  dast_scan:
    needs: [build_and_scan]
    runs-on: ubuntu-latest
    name: 🎯 DAST (ZAP)
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run App for DAST
        run: |
          docker run -d --name app-dast -p 3000:3000 ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:local
          sleep 20 # Wait for app to be ready

      - name: ZAP Baseline Scan
        run: |
          chmod 777 $(pwd)
          docker run -v "$(pwd):/zap/wrk/:rw" --network="host" -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://localhost:3000 -r report.html -J report.json || true

      - name: Upload DAST Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: report.*

  # =================================================================
  # STAGE 5: NOTIFICATION & SUMMARY
  # =================================================================
  summary:
    needs: [signing, dast_scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Create Pipeline Summary
        run: |
          echo "## 🚀 DevSecOps Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Base Image:** Chainguard Node.js 24 (Hardened)" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Production Ready" >> $GITHUB_STEP_SUMMARY
          echo "- **Security:** SAST/SCA/DAST Completed" >> $GITHUB_STEP_SUMMARY
          echo "- **Provenance:** Signed with Cosign ✅" >> $GITHUB_STEP_SUMMARY
