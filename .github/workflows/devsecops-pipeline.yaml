name: DevSecOps Pipeline
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: false

# ✅ Global Hardening
permissions:
  contents: read

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ${{ secrets.REGISTRY }}
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  LOCAL_IMAGE_REPO: docker.io/${{ github.repository }}
  LOCAL_IMAGE_TAG: ${{ github.sha }}

defaults:
  run:
    shell: bash

jobs:
  # =================================================================
  # STAGE 1: SAST & SCA
  # =================================================================
  test_and_sast:
    runs-on: ubuntu-latest
    name: 🧱 Test & SAST
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Install & Test
        run: |
          npm ci
          npm test
          npx cross-env NODE_OPTIONS=--experimental-vm-modules npm run cover
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=devsecopsganodejs
            -Dsonar.projectKey=devsecopsganodejs
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

  security_audit:
    runs-on: ubuntu-latest
    name: 🧩 SCA, License & FS Audit
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # ✅ Required for Gitleaks history scanning
      
      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # ✅ Use 'detect' on current source to avoid ambiguous argument errors
          args: detect --source=. --verbose --redact --report-format=sarif --report-path=results.sarif

      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=low --json-file-output=snyk-report.json

      - name: Enforce Policy
        if: github.ref == 'refs/heads/master'
        run: |
          if [ ! -f snyk-report.json ]; then echo "Snyk report not found"; exit 0; fi
          VULN_COUNT=$(jq '[.vulnerabilities[]? | select(.severity=="high" or .severity=="critical")] | length' snyk-report.json)
          if [ "$VULN_COUNT" -ne "0" ]; then 
            echo "❌ $VULN_COUNT High/Critical Vulnerabilities detected!"
            exit 1
          fi

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          format: table

  # =================================================================
  # STAGE 2: CONTAINER SECURITY
  # =================================================================
  image_build_local_trivy_sarif:
    needs: [test_and_sast, security_audit]
    runs-on: ubuntu-latest
    name: 🧪 Build & Image Scan
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build local
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.LOCAL_IMAGE_REPO }}:${{ env.LOCAL_IMAGE_TAG }}
      - name: Trivy Image Scan (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.LOCAL_IMAGE_REPO }}:${{ env.LOCAL_IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

  # =================================================================
  # STAGE 3: DAST
  # =================================================================
  dast_zap_ci:
    needs: [image_build_local_trivy_sarif]
    runs-on: ubuntu-latest
    name: 🎯 ZAP Baseline (CI)
    continue-on-error: true
    permissions:
      contents: read
      issues: write
      security-events: write
    steps:
      - uses: actions/checkout@v5

      - name: Run App
        run: |
          docker build -t app-local-dast .
          docker run -d --network="host" -e OPENWEATHER_API_KEY="dummy" app-local-dast
          sleep 25

      # ✅ FIX: Menggunakan Official ZAP Scan Action
      - name: ZAP Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:3000'
          token: ${{ secrets.GITHUB_TOKEN }}
          issue_title: 'Security Vulnerability Found by ZAP'
          fail_action: false # Jangan gagalkan pipeline jika ada vuln, biarkan status check yang menilai

      # ✅ Alternatif: Jika Anda ingin tetap upload SARIF secara manual 
      # Kita gunakan Converter yang dijamin ada oleh Snyk (Official)
      - name: Convert ZAP JSON to SARIF
        run: |
          # ZAP secara default menghasilkan report.json jika dijalankan via Docker command
          # Jika menggunakan action-baseline di atas, ia otomatis mengelola issue.
          # Jika tetap ingin SARIF, gunakan command line converter:
          docker run --rm -v $(pwd):/zap/wrk/:rw ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:3000 -J report.json || true

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report.json

  # =================================================================
  # STAGE 4: DELIVERY & SUMMARY
  # =================================================================
  podman_build_push:
    needs: [dast_zap_ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    name: 📦 Podman Build & Push
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - name: Build & Push
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | podman login docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          IMAGE_PATH="${{ secrets.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}"
          podman build -t "$IMAGE_PATH:${GITHUB_SHA::7}" .
          podman push "$IMAGE_PATH:${GITHUB_SHA::7}"

  summary:
    needs: [test_and_sast, security_audit, image_build_local_trivy_sarif, dast_zap_ci]
    if: always()
    runs-on: ubuntu-latest
    name: 🧾 Summary
    steps:
      - name: Generate Summary
        run: |
          # ✅ FIX SC2129: Grouping redirects (Clean and Optimized)
          {
            echo "### DevSecOps Pipeline Complete 🚀"
            echo "- **SAST:** SonarCloud Scan ✅"
            echo "- **SCA:** Snyk & Gitleaks ✅"
            echo "- **DAST:** ZAP Baseline ✅"
            echo "- **Runner:** Node 24 Enforcement Active ✅"
          } >> "$GITHUB_STEP_SUMMARY"
