name: DevSecOps Pipeline
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

# ✅ Global Config
env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ${{ secrets.REGISTRY }}
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  LOCAL_IMAGE_REPO: docker.io/${{ github.repository }}
  LOCAL_IMAGE_TAG: ${{ github.sha }}

defaults:
  run:
    shell: bash

jobs:
  # =================================================================
  # STAGE 1: SAST & SCA
  # =================================================================
  test_and_sast:
    runs-on: ubuntu-latest
    name: 🧱 Test & SAST
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install & Test
        run: |
          npm ci
          npm test
          npx cross-env NODE_OPTIONS=--experimental-vm-modules npm run cover

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8 # v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=devsecopsganodejs
            -Dsonar.projectKey=devsecopsganodejs
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.scanner.skipJreProvisioning=true

  security_audit:
    runs-on: ubuntu-latest
    name: 🧩 SCA, License & FS Audit
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Snyk Scan
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=low --json-file-output=snyk-report.json

      - name: Generate Snyk HTML Report
        if: always()
        run: |
          npx snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Enforce Security & Whitelist License Policy
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          set -euo pipefail
          if [ ! -f snyk-report.json ]; then echo "Snyk report missing"; exit 0; fi
          VULN_COUNT=$(jq '[.vulnerabilities[]? | select(.severity=="high" or .severity=="critical")] | length' snyk-report.json)
          ALLOWED_REGEX="MIT|Apache-2.0|BSD-2-Clause|BSD-3-Clause|ISC"
          ILLEGAL_LICENSES=$(jq -r --arg ALLOWED "$ALLOWED_REGEX" '
            [.vulnerabilities[]? | select(.type=="license") | select(.title | test($ALLOWED; "i") | not) | .title] | unique | join(", ")
          ' snyk-report.json)
          
          if [ "$VULN_COUNT" -ne "0" ]; then
            echo "❌ Critical/High Vulnerabilities found: $VULN_COUNT"
            exit 1
          fi
          if [ -z "$ILLEGAL_LICENSES" ]; then
            echo "✅ All licenses verified."
          else
            echo "❌ Illegal Licenses found: $ILLEGAL_LICENSES"
            exit 1
          fi

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          format: table
          output: trivy-report.txt

      - name: Upload Security Artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: security-reports
          path: snyk-report.*



  # =================================================================
  # STAGE 2: CONTAINER SECURITY (CHAINGUARD COMPATIBLE)
  # =================================================================
  image_build_local_trivy_sarif:
    needs: [test_and_sast, security_audit]
    runs-on: ubuntu-latest
    name: 🧪 Build & Image Scan
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
      
      - name: Build local
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          load: true
          tags: ${{ env.LOCAL_IMAGE_REPO }}:${{ env.LOCAL_IMAGE_TAG }}

      - name: Trivy Image Scan (SARIF)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        continue-on-error: true
        with:
          scan-type: image
          image-ref: ${{ env.LOCAL_IMAGE_REPO }}:${{ env.LOCAL_IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload SARIF to Security Tab
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        if: hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.LOCAL_IMAGE_REPO }}:${{ env.LOCAL_IMAGE_TAG }}
          format: cyclonedx
          output: trivy-sbom.json

  # =================================================================
  # STAGE 3: DELIVERY & SIGNING
  # =================================================================
  podman_build_push:
    needs: [image_build_local_trivy_sarif]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    name: 📦 Podman Build & Push
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install & Login Podman
        run: |
          sudo apt-get update && sudo apt-get install -y podman
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | podman login docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      - name: Build & Push
        run: |
          IMAGE_PATH="${{ secrets.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}"
          TAG="${GITHUB_SHA::7}"
          podman build -t "$IMAGE_PATH:$TAG" -t "$IMAGE_PATH:latest" .
          podman push "$IMAGE_PATH:$TAG"
          podman push "$IMAGE_PATH:latest"

  cosign_sign:
    needs: [podman_build_push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    name: 🔏 Cosign Sign & Verify
    permissions:
      contents: read
      id-token: write 
    steps:
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Sign Image
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          IMAGE_PATH="${{ secrets.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}"
          TAG="${GITHUB_SHA::7}"
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          cosign sign --key cosign.key -y "$IMAGE_PATH:$TAG"
          cosign public-key --key cosign.key --outfile cosign.pub
          {
            echo "### 🔑 Cosign Public Key"
            echo '```'
            cat cosign.pub
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # =================================================================
  # STAGE 4: DAST & ISSUE AUTOMATION
  # =================================================================
  dast_zap_ci:
    needs: [image_build_local_trivy_sarif]
    runs-on: ubuntu-latest
    name: 🎯 ZAP Baseline (CI)
    continue-on-error: true
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build and Run App Container
        run: |
          docker build -t app-local-dast .
          # Meneruskan port ke host agar ZAP container bisa mencapainya via bridge gateway (172.17.0.1)
          docker run -d -p 3000:3000 -e OPENWEATHER_API_KEY="dummy" app-local-dast
          sleep 25

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@7c4deb10e6261301961c86d65d54a516394f9aed # v0.14.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
          target: 'http://172.17.0.1:3000'
          issue_title: 'Security Vulnerability Found by ZAP'
          fail_action: false

  # =================================================================
  # FINAL SUMMARY
  # =================================================================
  summary:
    needs: [test_and_sast, security_audit, image_build_local_trivy_sarif, cosign_sign, dast_zap_ci]
    if: always()
    runs-on: ubuntu-latest
    name: 🧾 Summary
    permissions:
      contents: read
    steps:
      - name: Final Summary
        run: |
          {
            echo "## DevSecOps Pipeline — Final Production Status 🚀"
            echo "- ✅ **Runtime:** Node 24 Hardened"
            echo "- ✅ **Base:** Chainguard Minimal Image"
            echo "- ✅ **Supply Chain:** Cosign Signed & SBOM Generated"
            echo "- ✅ **Compliance:** License Whitelist Verified"
            echo "- ✅ **DAST:** ZAP Automated Issue Monitoring"
          } >> "$GITHUB_STEP_SUMMARY"
