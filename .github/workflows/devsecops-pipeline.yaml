name: DevSecOps Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: false

# ✅ STEP 1: Global Lockdown - Principle of Least Privilege
permissions:
  contents: read

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ${{ secrets.REGISTRY }}
  IMAGE_NAME: ${{ secrets.IMAGE_NAME }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  LOCAL_IMAGE_REPO: docker.io/${{ github.repository }}
  LOCAL_IMAGE_TAG: ${{ github.sha }}

defaults:
  run:
    shell: bash

jobs:
  # =================================================================
  # STAGE 1: SAST & SCA
  # =================================================================
  test_and_sast:
    runs-on: ubuntu-latest
    name: 🧱 Test & SAST
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Install & Test
        run: |
          npm ci
          npm test
          npx cross-env NODE_OPTIONS=--experimental-vm-modules npm run cover
          
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=devsecopsganodejs
            -Dsonar.projectKey=devsecopsganodejs
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.scanner.skipJreProvisioning=true

  security_audit:
    runs-on: ubuntu-latest
    name: 🧩 SCA, License & FS Audit
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          
      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=low --json-file-output=snyk-report.json
          
      - name: Generate Snyk HTML Report
        if: always()
        run: |
          npm install -g snyk-to-html
          snyk-to-html -i snyk-report.json -o snyk-report.html
          
      - name: Enforce Security & Whitelist License Policy
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          set -euo pipefail
          if [ ! -f snyk-report.json ]; then exit 2; fi
          VULN_COUNT=$(jq '[.vulnerabilities[]? | select(.severity=="high" or .severity=="critical")] | length' snyk-report.json)
          ALLOWED_REGEX="MIT|Apache-2.0|BSD-2-Clause|BSD-3-Clause|ISC"
          ILLEGAL_LICENSES=$(jq -r --arg ALLOWED "$ALLOWED_REGEX" '
            [.vulnerabilities[]? | select(.type=="license") | select(.title | test($ALLOWED; "i") | not) | .title] | unique | join(", ")
          ' snyk-report.json)
          if [ "$VULN_COUNT" -ne "0" ] || [ ! -z "$ILLEGAL_LICENSES" ]; then exit 1; fi
          
      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          format: table
          output: trivy-report.txt
          
      - name: Upload Security Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: snyk-report.*

  # =================================================================
  # STAGE 2: CONTAINER SECURITY
  # =================================================================
  image_build_local_trivy_sarif:
    needs: [test_and_sast, security_audit]
    runs-on: ubuntu-latest
    name: 🧪 Build & Image Scan
    permissions:
      contents: read
      security-events: write 
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Build local
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.LOCAL_IMAGE_REPO }}:${{ env.LOCAL_IMAGE_TAG }}
          
      - name: Trivy Image Scan (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        continue-on-error: true
        with:
          scan-type: image
          image-ref: ${{ env.LOCAL_IMAGE_REPO }}:${{ env.LOCAL_IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          
      - name: Upload SARIF to Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.LOCAL_IMAGE_REPO }}:${{ env.LOCAL_IMAGE_TAG }}
          format: cyclonedx
          output: trivy-sbom.json
          
      - name: Upload SBOM Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sbom
          path: trivy-sbom.json


  # =================================================================
  # STAGE 3: DELIVERY & SIGNING
  # =================================================================
  podman_build_push:
    needs: [image_build_local_trivy_sarif]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    name: 📦 Podman Build & Push
    steps:
      - uses: actions/checkout@v5
      - name: Install & Login Podman
        run: |
          sudo apt-get update && sudo apt-get install -y podman
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | podman login docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
      - name: Build & Push
        run: |
          IMAGE_PATH="${{ secrets.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}"
          TAG="${GITHUB_SHA::7}"
          podman build -t "$IMAGE_PATH:$TAG" -t "$IMAGE_PATH:latest" .
          podman push "$IMAGE_PATH:$TAG"
          podman push "$IMAGE_PATH:latest"

  cosign_sign:
    needs: [podman_build_push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    name: 🔏 Cosign Sign & Verify
    steps:
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Sign & Export Public Key
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          IMAGE_PATH="${{ secrets.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}"
          TAG="${GITHUB_SHA::7}"
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          cosign sign --key cosign.key -y "$IMAGE_PATH:$TAG"
          cosign public-key --key cosign.key --outfile cosign.pub
          {
            echo "### 🔑 Cosign Public Key"
            echo '```'
            cat cosign.pub
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # =================================================================
  # STAGE 4: DAST
  # =================================================================
  dast_zap_ci:
    needs: [image_build_local_trivy_sarif]
    runs-on: ubuntu-latest
    name: 🎯 ZAP Baseline (CI)
    continue-on-error: true
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        
      - name: Set Permissions
        run: chmod 777 "$(pwd)"
        
      - name: Build and Run App Container Locally
        run: |
          docker build -t app-local-dast .
          docker run -d -p 3000:3000 -e OPENWEATHER_API_KEY="dummy-token-for-dast" app-local-dast
          sleep 15
          
      - name: ZAP Baseline Scan
        run: |
          docker run -v "$(pwd):/zap/wrk/:rw" --network="host" -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://localhost:3000 -r report.html -J report.json || true
          
      - uses: actions/upload-artifact@v4
        with:
          name: zap-report-ci
          path: report.*

      - name: Create or Update ZAP Security Issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          if [ -f report.json ]; then
            # Parse jumlah alert 
            ALERTS=$(jq '[.site[].alerts[]?] | length' report.json || echo "0")
            EXISTING_ISSUE=$(gh issue list -R "$REPO" --label "security" --state open --json number --jq '.[0].number')
            
            if [ "$ALERTS" -gt "0" ]; then
              echo "Creating ZAP DAST Issue for $ALERTS alerts..."
              if [ -z "$EXISTING_ISSUE" ] || [ "$EXISTING_ISSUE" == "null" ]; then
                gh issue create -R "$REPO" \
                  --title "🎯 DAST ZAP Vulnerabilities Detected" \
                  --body "OWASP ZAP mendeteksi **$ALERTS** buah kelemahan keamanan (seperti missing security headers) saat menguji server aplikasi yang sedang menyala secara live. Silakan unduh bukti \`report.html\` di tab **Artifacts**." \
                  --label "security"
              else
                ALERTS_DETAIL=$(jq '.site[0].alerts[]? | "- \(.name) (\(.riskdesc))"' report.json -r | head -n 5 || echo "- Unable to parse alert details")
                gh issue comment "$EXISTING_ISSUE" -R "$REPO" --body "⚠️ **Update**: Owasp ZAP DAST masih mendeteksi $ALERTS peringatan kerentanan pada build #${{ github.run_number }}."$'\n\n'"**Rincian Teratas:**"$'\n'"$ALERTS_DETAIL"
              fi
            else
              if [ -n "$EXISTING_ISSUE" ] && [ "$EXISTING_ISSUE" != "null" ]; then
                echo "ZAP alerts resolved! Auto-closing issue #$EXISTING_ISSUE..."
                gh issue close "$EXISTING_ISSUE" -R "$REPO" -c "✅ **Resolved**: Kerentanan telah diperbaiki. Hasil scan OWASP ZAP terbaru mendeteksi 0 *alerts* (Aman)."
              else
                echo "No ZAP alerts detected. System is clean."
              fi
            fi
          fi

  # =================================================================
  # FINAL SUMMARY
  # =================================================================
  summary:
    needs: [test_and_sast, security_audit, podman_build_push, cosign_sign, dast_zap_ci]
    if: always()
    runs-on: ubuntu-latest
    name: 🧾 Summary
    steps:
      - name: Final Summary
        run: |
          {
            echo "## DevSecOps Pipeline — Summary"
            echo "- ✅ Runtime: Node 24 (Hardened)"
            echo "- ✅ Security: PoLP Job-level Permissions"
            echo "- ✅ Compliance: ISC License & Cosign Provenance"
            echo "- ✅ Status: Production Ready"
          } >> "$GITHUB_STEP_SUMMARY"
