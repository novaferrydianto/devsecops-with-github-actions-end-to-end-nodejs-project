name: DevSecOps Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write
  actions: read
  issues: write
  packages: write

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Kita panggil langsung di level job untuk akurasi lebih tinggi
  LOCAL_IMAGE_REPO: docker.io/${{ github.repository }}
  LOCAL_IMAGE_TAG: ${{ github.sha }}

defaults:
  run:
    shell: bash

jobs:
  test_and_sast:
    runs-on: ubuntu-latest
    name: 🧱 Test & SAST
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # --- DEBUG STEP: PEMBUKTIAN RAHASIA ---
      - name: 🛡️ Verify Secrets Visibility
        run: |
          echo "Checking Secrets Context..."
          if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo "❌ ERROR: SONAR_TOKEN is NULL. If this is a PR from a Fork, secrets are hidden by design."
            exit 1
          fi
          echo "✅ SONAR_TOKEN detected. Proceeding to scan..."

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install & Test
        run: |
          npm ci
          npm test
          npx cross-env NODE_OPTIONS=--experimental-vm-modules npm run cover

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          # Injeksi langsung di sini untuk memastikan scope terjaga
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=devsecopsganodejs
            -Dsonar.projectKey=devsecopsganodejs
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.scanner.skipJreProvisioning=true

  security_audit:
    runs-on: ubuntu-latest
    name: 🧩 SCA & FS Audit
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Snyk Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=low --json-file-output=snyk-report.json

      - name: Generate Snyk HTML Report
        if: always()
        run: |
          npm install -g snyk-to-html
          snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Enforce Snyk Policy
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          VULN_COUNT=$(jq '[.vulnerabilities[]? | select(.severity=="high" or .severity=="critical")] | length' snyk-report.json)
          if [ "$VULN_COUNT" -ne "0" ]; then exit 1; fi

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: table
          output: trivy-report.txt

      - name: Upload Security Artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: security-reports
          path: snyk-report.*

  podman_build_push:
    needs: [test_and_sast, security_audit]
    runs-on: ubuntu-latest
    name: 📦 Podman Build & Push
    steps:
      - uses: actions/checkout@v5
      - name: Push to Registry
        run: |
          sudo apt-get update && sudo apt-get install -y podman
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | podman login docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          FULL_PATH="${{ secrets.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}"
          TAG="${GITHUB_SHA::7}"
          podman build -t "$FULL_PATH:$TAG" -t "$FULL_PATH:latest" .
          podman push "$FULL_PATH:$TAG"
          podman push "$FULL_PATH:latest"

  cosign_sign:
    needs: [podman_build_push]
    runs-on: ubuntu-latest
    name: 🔏 Cosign Sign & Verify
    steps:
      - uses: sigstore/cosign-installer@v3
      - name: Sign & Verification Summaries
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          echo "$COSIGN_PRIVATE_KEY" > cosign.key
          FULL_IMAGE="${{ secrets.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}"
          TAG="${GITHUB_SHA::7}"
          cosign sign --key cosign.key -y "$FULL_IMAGE:$TAG"
          cosign public-key --key cosign.key --outfile cosign.pub
          echo "### 🔑 Cosign Public Key" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat cosign.pub >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  summary:
    needs: [test_and_sast, security_audit, podman_build_push, cosign_sign]
    if: always()
    runs-on: ubuntu-latest
    name: 🧾 Summary
    steps:
      - run: echo "Pipeline Finished." >> "$GITHUB_STEP_SUMMARY"
