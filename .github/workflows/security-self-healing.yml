name: 🛡️ Security Self-Healing

on:
  workflow_run:
    workflows: ["DevSecOps Pipeline"]
    types: [completed]
    branches: [master]

permissions:
  contents: read

jobs:
  close-resolved-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    # Hanya berjalan jika pipeline utama BERHASIL (Success)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: 🔍 Find and Close Resolved Security Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ✅ FIXED 1: Mendeklarasikan target repositori secara eksplisit
          REPO: ${{ github.repository }}
        run: |
          echo "Pipeline sukses! Memulai pembersihan tiket keamanan..."
          
          # ✅ FIXED 2: Menyuntikkan -R $REPO untuk bypass pencarian .git lokal
          ISSUES=$(gh issue list -R "$REPO" --label "security" --label "high-risk" --json number --jq '.[].number')
          
          if [ -z "$ISSUES" ]; then
            echo "✅ Tidak ada tiket keamanan yang terbuka. Bagus!"
            exit 0
          fi
          
          # Iterasi dan tutup tiket
          for ISSUE_NUMBER in $ISSUES; do
            echo "Closing issue #$ISSUE_NUMBER..."
            
            # ✅ FIXED 3: Menyuntikkan -R $REPO pada saat memberi komentar
            gh issue comment "$ISSUE_NUMBER" -R "$REPO" --body "✅ **Self-Healing Triggered**: Build #${{ github.event.workflow_run.run_number }} sukses. Sistem mendeteksi bahwa kerentanan ini telah diperbaiki atau dimitigasi. Menutup tiket secara otomatis."
            
            # ✅ FIXED 4: Menyuntikkan -R $REPO pada saat menutup tiket
            gh issue close "$ISSUE_NUMBER" -R "$REPO" --reason "completed"
          done
