name: Secret Scanning (TruffleHog)

# ✅ PoLP Permissions (Hanya yang diperlukan)
permissions:
  contents: read

on:
  pull_request:
    branches: [master]

jobs:
  secret_scan:
    name: 🕵️ Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      # ✅ FIXED: checkout@v6 tidak ada, gunakan v4 (Native Node 20/24)
      - name: 🛒 Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      # =============================
      # 1) INSTALL TRUFFLEHOG V3
      # =============================
      - name: 🛠️ Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/580628bb9d5455140899afe2cb981ff5640bf399/scripts/install.sh | sh -s -- -b /usr/local/bin

      # =============================
      # 2) RUN SCAN & EXTRACT NDJSON
      # =============================
      - name: 🚨 Run TruffleHog Scan
        run: |
          # Hanya deteksi secret yang "Verified" (aktif/valid) agar tidak banyak false positive
          trufflehog git . --only-verified --json --no-update > trufflehog-report.json || true

      # =============================
      # 3) PARSE NDJSON TO ARRAY
      # =============================
      - name: 📊 Parse Secret Findings
        id: parse
        run: |
          COUNT=$(jq -s 'length' trufflehog-report.json 2>/dev/null || echo "0")
          echo "SECRET_COUNT=$COUNT" >> "$GITHUB_ENV"
          
          if [ "$COUNT" -gt 0 ]; then
            echo "Found $COUNT verified secrets!"
            {
              echo "### 🚨 Verified Secrets Found: $COUNT"
              echo "| Detector | File | Line |"
              echo "|---|---|---|"
              jq -s -r '.[] | "| \(.DetectorName) | \(.SourceMetadata.Data.Git.file) | \(.SourceMetadata.Data.Git.line) |"' trufflehog-report.json
            } > issue-body.md
          else
            echo "✅ No verified secrets found."
          fi

      # =============================
      # 4) AUTO COMMENT ON PR
      # =============================
      - name: 💬 Comment on PR
        if: env.SECRET_COUNT != '0'
        uses: marocchino/sticky-pull-request-comment@d4d6b0936434b21bc8345ad45a440c5f7d2c40ff # v3
        with:
          recreate: true
          message: |
            ## 🛑 Blocked: Verified Secret(s) Detected!
            TruffleHog found **${{ env.SECRET_COUNT }}** active secret(s) in this Pull Request.
            For security reasons, this PR cannot be merged until the secrets are revoked and removed from the commit history.
            *Check the Security Issue for details.*

      # =============================
      # 5) SMART CREATE OR UPDATE ISSUE (ANTI-SPAM)
      # =============================
      - name: 📝 Create or Update Issue (Idempotent)
        if: env.SECRET_COUNT != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Mengecek tiket keamanan yang masih aktif..."
          # Cari 1 issue terbuka dengan label 'secrets-leak'
          EXISTING_ISSUE=$(gh issue list --label "secrets-leak" --state open --json number --jq '.[0].number')
          
          if [ -z "$EXISTING_ISSUE" ] || [ "$EXISTING_ISSUE" = "null" ]; then
            echo "Belum ada tiket. Membuat tiket baru..."
            gh issue create \
              --title "🚨 Verified Secret Leak Detected in PR #${{ github.event.pull_request.number }}" \
              --body-file issue-body.md \
              --label "security,high-risk,secrets-leak"
          else
            echo "Tiket sudah ada (#$EXISTING_ISSUE). Menambahkan komentar update agar tidak spam..."
            gh issue comment "$EXISTING_ISSUE" --body "⚠️ **Update**: TruffleHog mendeteksi secret masih ada pada commit terbaru."
            gh issue comment "$EXISTING_ISSUE" --body-file issue-body.md
          fi

      # =============================
      # 6) UPLOAD RAW REPORT
      # =============================
      - name: 📤 Upload Full Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: env.SECRET_COUNT != '0'
        with:
          name: trufflehog-full-report
          path: trufflehog-report.json

      # =============================
      # 7) FAIL JOB → BLOCK PR MERGE
      # =============================
      - name: ❌ Fail the build
        if: env.SECRET_COUNT != '0'
        run: |
          echo "❌ Active secret leak detected. Blocking PR merge to protect SawitPRO."
          exit 1
