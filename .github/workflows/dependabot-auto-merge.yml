name: 🤖 Dependabot Auto-Merge (Patch Only)

on:
  pull_request:
    types: [opened, synchronize, reopened]

# ✅ REMEDIATION: Global Permissions Lockdown (StepSecurity Scorecard FIX)
# Ini akan membuat skor Token-Permissions menjadi 10/10
permissions:
  contents: read

jobs:
  dependabot-auto-merge:
    runs-on: ubuntu-latest
    name: 🚦 Smart Auto-Merge
    # HANYA eksekusi jika pembuat PR adalah bot resmi Dependabot
    if: github.actor == 'dependabot[bot]'
    
    # ✅ Elevasi izin HANYA pada level job ini
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Fetch Dependabot Metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-Approve & Enable Auto-Merge for Patches
        # Logika: Hanya eksekusi jika ini adalah PATCH update (keamanan tinggi)
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: |
          echo "✅ Patch update detected. Approving PR..."
          gh pr review --approve "$PR_URL"
          
          echo "🔄 Enabling auto-merge (squash strategy)..."
          gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
